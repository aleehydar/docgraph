version: "3.9"

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: docgraph-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-docgraph123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    image: ${DOCKERHUB_USERNAME:-local}/docgraph-api:latest
    build: .
    container_name: docgraph-api
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    ports:
      - "8000:8000"
    volumes:
      - faiss_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/docgraph-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docgraph-ui
    env_file: .env
    ports:
      - "8501:80"
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: docgraph-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: docgraph-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  neo4j_data:
  neo4j_logs:
  faiss_data:
  grafana_data:
